<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="PAPER.css">
</head>

<body>
    <header>
        <h1>
            ROCK PAPER SCISSORS  <img class="Logo" src="IMAGES/Header.png" alt="Lgo">
        </h1>
    </header>
    <MAIN>
        <section class="images">
            <button class="b1 hideBtn1 hideBtn4 animate btn">
                <img src="IMAGES/Fist.png" alt="Fist">
            </button>
            <button class="b2 hideBtn2 hideBtn5 animate btn">
                <img src="IMAGES/Paper.png" alt="Paper">
            </button>
            <button class="b3 hideBtn3 hideBtn6 animate btn">
                <img src="IMAGES/Scissors.png" alt="Scissors">
            </button>
        </section>
        <section class="final">
            <p class="draw">Draw Dude !</p>
            <p class="won">The Winner is  </p>
        </section>
        <section class="result">
            <p class="user">You : 0</p>
            <p class="comp">Computer : 0</p>
        </section>
        <section>
            <button class="reset">Reset</button>
        </section>
    </MAIN>
    <script src="SCISSORS.js"></script>
</body>

</html>
